{% extends "survey_app/base.html" %}

{% block content %}
<section class="question-stage">
  <form method="post" class="question-form card">
    {% csrf_token %}
    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <div class="question-block large">
      <h2>{{ article.headline }}</h2>
    </div>

    <div class="question-block large">
      <h2>How does the article text relate to the headline?</h2>
      <div class="option-row large stacked-options">
        <label><input type="radio" name="classification_choice" value="agree" {% if selected_classification == "agree" %}checked{% endif %}> The article body supports the headline's claim.</label>
        <label><input type="radio" name="classification_choice" value="disagree" {% if selected_classification == "disagree" %}checked{% endif %}> The article body contradicts the headline's claim.</label>
        <label><input type="radio" name="classification_choice" value="discuss" {% if selected_classification == "discuss" %}checked{% endif %}> The article body is about the same topic, but does not directly confirm or refute the headline.</label>
        <label><input type="radio" name="classification_choice" value="unrelated" {% if selected_classification == "unrelated" %}checked{% endif %}> The article body and headline are not meaningfully about the same event or topic.</label>
      </div>
    </div>

    <button type="submit" class="btn">Submit Response</button>
  </form>
</section>
{% endblock %}
