{% extends "survey_app/base.html" %}

{% block content %}
<section class="review-stage">
  <p class="stage-kicker">{{ movie.title }} ({{ movie.year }})</p>
  <div class="review-focus card">
    <p class="review-focus-text">{{ review_text }}</p>
  </div>
  <a class="btn review-cta" href="{% url 'survey_app:movie_questions' movie.id %}">Review Questions</a>
</section>
{% endblock %}
